name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  qa:
    name: QA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --check src/main.js
      - run: node --check src/preload.js
      - run: node --check src/renderer.js
      - run: node --check src/importer-core.js
      - run: node --check tests/qa-importer.js
      - run: npm audit --omit=dev
      - run: npm run qa

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: qa
    env:
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build ad-hoc macOS DMG
        if: ${{ env.MAC_SIGN_IDENTITY == '' }}
        run: CSC_IDENTITY_AUTO_DISCOVERY=false npm run dist:mac
      - name: Import Developer ID certificate
        if: ${{ env.MAC_SIGN_IDENTITY != '' }}
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      - name: Build notarized macOS DMG
        if: ${{ env.MAC_SIGN_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac
      - uses: actions/upload-artifact@v7
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: qa
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: dist/*.exe
