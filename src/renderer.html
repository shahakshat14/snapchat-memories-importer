<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapchat to Google Photos</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="title-row">
          <div>
            <p class="eyebrow">Local Importer</p>
            <h1>Snapchat to Google Photos</h1>
          </div>
          <div class="status-pill" id="statusPill">Ready</div>
        </div>

        <div class="steps">
          <button class="step" id="zipButton">
            <span class="step-index">1</span>
            <span>
              <strong>Choose Snapchat zip</strong>
              <small id="zipPath">No file selected</small>
            </span>
          </button>

          <button class="step" id="credentialsButton">
            <span class="step-index">2</span>
            <span>
              <strong>Choose Google OAuth JSON</strong>
              <small id="credentialsPath">Required for Google login</small>
            </span>
          </button>

          <button class="step" id="signInButton">
            <span class="step-index">3</span>
            <span>
              <strong>Sign in with Google</strong>
              <small id="accountLabel">Not connected</small>
            </span>
          </button>
        </div>

        <div class="progress-wrap">
          <div class="progress-header">
            <span id="stageLabel">Waiting</span>
            <span id="percentLabel">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <p id="message">Pick your Snapchat export zip to begin.</p>
        </div>

        <section class="preview" id="previewPanel" hidden>
          <div class="preview-head">
            <div>
              <h2>Preview</h2>
              <p id="previewLocation"></p>
            </div>
            <button class="secondary compact" id="openMergedButton">Open Folder</button>
          </div>
          <div class="metrics">
            <div><strong id="totalMetric">0</strong><small>Merged</small></div>
            <div><strong id="dateMetric">0</strong><small>With Date</small></div>
            <div><strong id="gpsMetric">0</strong><small>With GPS</small></div>
            <div><strong id="missingMetric">0</strong><small>Missing</small></div>
          </div>
          <div class="sample-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>File</th>
                  <th>Source</th>
                  <th>Date</th>
                  <th>GPS</th>
                </tr>
              </thead>
              <tbody id="sampleRows"></tbody>
            </table>
          </div>
          <label class="review-check">
            <input type="checkbox" id="reviewCheckbox" />
            <span>I reviewed the merged files and metadata preview</span>
          </label>
        </section>

        <div class="actions">
          <button class="primary" id="prepareButton">Prepare Preview</button>
          <button class="secondary" id="zipExportButton">Export ZIP</button>
          <button class="secondary" id="applePhotosButton">Apple Photos</button>
          <button class="primary" id="uploadButton">Google Photos</button>
          <button class="secondary" id="cancelButton">Cancel</button>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
